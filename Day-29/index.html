<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <textarea id="text"></textarea>
    <p>Characters:<span id="count">0</span></p>
    <script>
        let textele = document.getElementById("text");
        let countchar = document.getElementById("count");
        textele.addEventListener("input", () => {
            countchar.innerText=textele.value.length

        })

    </script>
</body>

</html>
