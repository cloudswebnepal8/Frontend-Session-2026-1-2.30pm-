<html>

<head>
    <title>Form using input tags</title>
</head>

<body>
    <label>Name:</label>
    <input type="text" placeholder="Enter your name" required> <br> <br>

    <label>Email:</label>
    <input type="email" placeholder="Enter your email" required> <br> <br>

    <label>Password:</label>
    <input type="password" placeholder="Enter your password" > <br> <br>

    <label>Gender:</label>

    <input type="radio" name="gender" id="male">
    <label for="male">Male</label>

    <input type="radio" name="gender" id="female"> 
    <label for="female">Female</label>

    <input type="radio" name="gender" id="other">
    <label for="other">Other</label>  <br> <br>

    <label>Hobbies:</label>
    <input type="checkbox"> 
    <label>Coding</label> 

     <input type="checkbox"> 
    <label>Travelling</label> 

     <input type="checkbox"> 
    <label>Listening songs</label> 

     <input type="checkbox"> 
    <label>Watching movies</label> <br> <br>

    <label>Phone Number:</label>
    <input type="number" placeholder="98xxxxxxxxxx">  <br> <br>

    <input type="date">

    <input type="datetime">
    <input type="datetime-local">
    <input type="color">
    
    <input type="file">


    <input type="button" value="submit">



    
</body>

</html>
